name: Daily Recruitment Report

on:
  schedule:
    # 提前 2 小时触发，补偿 GitHub 调度延迟（实测推送常拖到北京 10 点多）。
    # UTC 22:00 = 北京次日 06:00；延迟约 2h 后推送落在 08:00 附近。
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write   # 允许 push DB 回主分支 + push gh-pages

concurrency:
  # jobs.db 是二进制状态文件，多个抓取任务并发回写时无法自动合并。
  # 排队而不是取消正在运行的任务，避免丢失一次完整抓取结果。
  group: daily-recruitment-report
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      # CI runner 是 UTC：cron UTC 22:00 = 中国次日 06:00，但 date.today() 在 UTC 下
      # 仍是前一天，导致报告标题/crawled_at 比中国日历晚一天。强制中国时区修正。
      TZ: Asia/Shanghai
    # 公司扩到数百家后，并发爬取仍可能跑较久；显式设上限留足余量（默认 360）。
    timeout-minutes: 330
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          REPORT_BASE_URL: ${{ vars.REPORT_BASE_URL }}
          CI: "true"
        run: python main.py

      - name: Commit DB back to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/jobs.db
          if git diff --staged --quiet; then
            echo "No DB changes to commit"
          else
            git commit -m "chore: update jobs.db $(date -u +%Y-%m-%d) [skip ci]"
            # 先 rebase 拉取远端新提交，避免与手动触发/其他 push 并发时 non-fast-forward 失败
            if ! git pull --rebase --autostash origin main; then
              # jobs.db 是 SQLite 二进制文件。工作流间的唯一冲突可保留本次
              # 完整抓取后的数据库；其他文件冲突必须继续失败并交由人工处理。
              conflicts="$(git diff --name-only --diff-filter=U)"
              if [ "$conflicts" = "data/jobs.db" ]; then
                git checkout --theirs data/jobs.db
                git add data/jobs.db
                GIT_EDITOR=true git rebase --continue
              else
                echo "Unexpected rebase conflict: $conflicts" >&2
                exit 1
              fi
            fi
            git push
          fi

      - name: Deploy report to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          publish_branch: gh-pages
          # 有意保留历史日期报告（每份约 50KB，长期体量可忽略，便于回看往期）
          keep_files: true
